<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesFlow Pro | Advanced Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; scroll-behavior: smooth; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* Toast Animation */
        #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 200; }
        .toast { animation: slideIn 0.3s ease-out forwards; min-width: 250px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .timeline-card { border-left: 3px solid #4f46e5; position: relative; padding-left: 1.5rem; }
        .timeline-card::before { content: ''; position: absolute; left: -0.55rem; top: 1.25rem; width: 0.8rem; height: 0.8rem; background: #4f46e5; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="toast-container"></div>

    <div id="login-overlay" class="fixed inset-0 bg-indigo-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl text-center max-w-sm w-full border-4 border-indigo-100">
            <div class="text-6xl mb-6">🚀</div>
            <h2 class="text-3xl font-bold text-indigo-700 mb-2">SalesFlow</h2>
            <p class="text-gray-400 mb-8 text-sm">เข้าใช้งานระบบจัดการงานขาย</p>
            <div id="g_id_onload" data-client_id="YOUR_CLIENT_ID" data-callback="handleSignIn"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
        </div>
    </div>

    <nav class="bg-white/90 backdrop-blur-md border-b p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl text-white font-bold shadow-lg shadow-indigo-200">SF</div>
            <div>
                <h1 class="font-bold text-gray-800 leading-none text-sm">SalesFlow <span class="text-indigo-500">Pro</span></h1>
                <span id="user-display" class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">Authorized User</span>
            </div>
        </div>
        <button onclick="toggleSidebar()" class="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16m4 6h16"></path></svg>
        </button>
    </nav>

    <div id="sidebar" class="fixed right-0 top-0 h-full w-72 bg-white z-[60] shadow-2xl translate-x-full p-8 transition-transform">
        <div class="flex justify-between items-center mb-10 border-b pb-4">
            <span class="text-indigo-600 font-black text-xs tracking-widest uppercase">Navigation</span>
            <button onclick="toggleSidebar()" class="text-gray-400">✕</button>
        </div>
        <nav class="space-y-3">
            <button onclick="showPage('page-dashboard')" class="w-full text-left p-4 rounded-2xl hover:bg-indigo-50 transition flex items-center gap-4 text-gray-600 font-bold">📊 Dashboard</button>
            <button onclick="showPage('page-profile')" class="w-full text-left p-4 rounded-2xl hover:bg-indigo-50 transition flex items-center gap-4 text-gray-600 font-bold">👤 My Profile</button>
            <button onclick="showPage('page-form')" class="w-full text-left p-4 rounded-2xl hover:bg-indigo-50 transition flex items-center gap-4 text-gray-600 font-bold">➕ New Activity</button>
            <button onclick="showPage('page-plan-list')" class="w-full text-left p-4 rounded-2xl hover:bg-indigo-50 transition flex items-center gap-4 text-gray-600 font-bold">📅 Scheduled Plans</button>
            <div class="pt-10">
                <button onclick="logout()" class="w-full text-left p-4 rounded-2xl text-red-400 hover:bg-red-50 transition flex items-center gap-4 font-bold">🚪 Logout</button>
            </div>
        </nav>
    </div>

    <section id="page-profile" class="tab-content p-6 max-w-2xl mx-auto">
        <div class="bg-white rounded-[3rem] shadow-xl p-10 text-center border-t-8 border-indigo-500 relative">
            <div class="w-24 h-24 bg-indigo-50 rounded-full mx-auto mb-6 flex items-center justify-center text-4xl">👤</div>
            <h2 id="prof-name" class="text-2xl font-black text-gray-800">...</h2>
            <p id="prof-email" class="text-gray-400 text-sm mb-8">...</p>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-50 p-6 rounded-3xl text-left"><span class="text-[9px] font-bold text-gray-400 uppercase">Role</span><p class="font-bold text-indigo-600">Sales Professional</p></div>
                <div class="bg-slate-50 p-6 rounded-3xl text-left"><span class="text-[9px] font-bold text-gray-400 uppercase">Status</span><p class="font-bold text-green-500">Active (30 Days)</p></div>
            </div>
        </div>
    </section>

    <section id="page-dashboard" class="tab-content active p-6 max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <div>
                <h2 class="text-4xl font-black text-gray-800 tracking-tighter">Dashboard</h2>
                <p class="text-gray-400 text-sm">ติดตามกิจกรรม 10 รายล่าสุดของคุณ</p>
            </div>
            
            <div class="relative w-full md:w-80">
                <input type="text" id="dashboardSearch" oninput="filterDashboard()" 
                       placeholder="ค้นหาลูกค้า, โมเดล, หรือหัวข้อ..." 
                       class="w-full p-4 pl-12 bg-white rounded-2xl shadow-sm border-none outline-none focus:ring-2 focus:ring-indigo-400 text-sm font-medium">
                <div class="absolute left-4 top-4 text-gray-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </div>

        <div id="unique-customer-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </section>

    <div id="timeline-modal" class="fixed inset-0 bg-indigo-900/40 z-[100] hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-3xl max-h-[85vh] rounded-[3.5rem] shadow-2xl overflow-hidden flex flex-col">
            <div class="p-8 border-b flex justify-between items-center bg-indigo-50/50">
                <div>
                    <h2 id="modal-cust-name" class="text-2xl font-black text-indigo-900 leading-none">-</h2>
                    <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest mt-2">Activity Timeline</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="downloadPDF()" class="bg-white p-3 rounded-xl shadow-sm hover:bg-indigo-600 hover:text-white transition text-xs font-black">PDF</button>
                    <button onclick="closeTimeline()" class="bg-white p-3 rounded-xl shadow-sm text-gray-400 hover:text-red-500 transition text-sm">✕</button>
                </div>
            </div>
            <div id="timeline-content" class="flex-1 overflow-y-auto p-10 space-y-8 bg-white">
                </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw5gWKUSrmQMivgnSTDsiCubx0toR1lRORjij5rj3iSvyWJpIT1UYr0lPjwfpakbmcr/exec"; 
        let allRecords = [];
        let currentUser = null;

        // --- 1. Notification System (Toast) ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-500' : 'bg-red-500';
            toast.className = `toast ${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl mb-3 flex items-center gap-3 font-bold text-sm`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        // --- 2. Auth System (30 Days) ---
        window.onload = () => {
            const saved = localStorage.getItem('sales_user_30d');
            if (saved) {
                const user = JSON.parse(saved);
                if (new Date().getTime() < user.expiry) {
                    currentUser = user;
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('user-display').innerText = user.name;
                    document.getElementById('prof-name').innerText = user.name;
                    document.getElementById('prof-email').innerText = user.email;
                    fetchInitialData();
                } else { localStorage.removeItem('sales_user_30d'); }
            }
        };

        function handleSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            const expiry = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);
            currentUser = { email: payload.email, name: payload.name, expiry: expiry };
            localStorage.setItem('sales_user_30d', JSON.stringify(currentUser));
            showToast("ยินดีต้อนรับ! ล็อกอินสำเร็จ");
            setTimeout(() => location.reload(), 1000);
        }

        function logout() { 
            localStorage.removeItem('sales_user_30d'); 
            showToast("ออกจากระบบแล้ว");
            setTimeout(() => location.reload(), 1000); 
        }

        // --- 3. Dashboard Filter & Rendering ---
        async function fetchInitialData() {
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getAll&email=${currentUser.email}`);
                const data = await res.json();
                allRecords = data.records || [];
                renderUniqueDashboard(allRecords);
            } catch (e) { showToast("ไม่สามารถโหลดข้อมูลได้", "error"); }
        }

        function filterDashboard() {
            const term = document.getElementById('dashboardSearch').value.toLowerCase();
            // ค้นหาทั้งชื่อลูกค้า (Col C), Model (Col D), หัวข้อ (Col G)
            const filtered = allRecords.filter(r => 
                r[2].toLowerCase().includes(term) || 
                r[3].toLowerCase().includes(term) || 
                r[6].toLowerCase().includes(term)
            );
            renderUniqueDashboard(filtered);
        }

        function renderUniqueDashboard(data) {
            const list = document.getElementById('unique-customer-list');
            list.innerHTML = '';
            
            const unique = [];
            const seen = new Set();
            // กรอง 10 รายล่าสุดที่ไม่ซ้ำชื่อลูกค้า
            for (let i = data.length - 1; i >= 0; i--) {
                const name = data[i][2];
                if (!seen.has(name) && unique.length < 10) {
                    seen.add(name);
                    unique.push(data[i]);
                }
            }

            unique.forEach(r => {
                list.innerHTML += `
                    <div onclick="openTimeline('${r[2]}')" class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 hover:shadow-xl hover:scale-[1.02] transition cursor-pointer group">
                        <div class="flex justify-between items-start mb-6">
                            <div class="bg-indigo-50 p-4 rounded-2xl text-2xl group-hover:bg-indigo-600 transition">🏢</div>
                            <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest">${r[5]}</span>
                        </div>
                        <h4 class="font-black text-gray-800 text-lg mb-1">${r[2]}</h4>
                        <p class="text-xs text-indigo-400 font-bold uppercase tracking-widest mb-4">${r[3] || 'No Model'}</p>
                        <div class="pt-4 border-t border-dashed flex justify-between items-center">
                            <span class="text-[10px] text-gray-400 font-bold">LATEST VISIT</span>
                            <span class="bg-green-50 text-green-600 px-3 py-1 rounded-full text-[9px] font-black">SUCCESS</span>
                        </div>
                    </div>`;
            });
        }

        // --- 4. Timeline Modal ---
        function openTimeline(name) {
            document.getElementById('modal-cust-name').innerText = name;
            const container = document.getElementById('timeline-content');
            container.innerHTML = '';
            
            const history = allRecords.filter(r => r[2] === name).reverse();
            history.forEach(r => {
                container.innerHTML += `
                    <div class="timeline-card">
                        <div class="bg-slate-50 p-6 rounded-3xl">
                            <div class="flex justify-between mb-2">
                                <span class="text-[10px] font-black text-indigo-600 uppercase">ครั้งที่ ${r[4]}</span>
                                <span class="text-[10px] font-bold text-gray-400">${r[5]}</span>
                            </div>
                            <h5 class="font-bold text-gray-800 mb-2">${r[6]}</h5>
                            <p class="text-sm text-gray-500 leading-relaxed">${r[8]}</p>
                        </div>
                    </div>`;
            });
            document.getElementById('timeline-modal').style.display = 'flex';
        }

        function closeTimeline() { document.getElementById('timeline-modal').style.display = 'none'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('translate-x-full'); }
        function showPage(id) {
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            toggleSidebar();
        }

        // --- 5. Export ---
        function downloadPDF() {
            const element = document.getElementById('timeline-content');
            const name = document.getElementById('modal-cust-name').innerText;
            html2pdf().from(element).save(`${name}_History.pdf`);
            showToast("กำลังดาวน์โหลด PDF...");
        }
    </script>
</body>
</html>
