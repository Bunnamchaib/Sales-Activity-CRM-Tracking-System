<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesFlow Pro | Smart Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="login-overlay" class="fixed inset-0 bg-indigo-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl text-center max-w-sm w-full">
            <div class="text-6xl mb-6">🚀</div>
            <h2 class="text-3xl font-bold text-indigo-700 mb-2">SalesFlow</h2>
            <p class="text-gray-400 mb-10 text-sm">กรุณาเข้าสู่ระบบเพื่อใช้งานระบบติดตามลูกค้า</p>
            <div id="g_id_onload"
                 data-client_id="15068641604-u0mle3asm2div94ld1l891s2an8i5tpf.apps.googleusercontent.com"
                 data-callback="handleSignIn">
            </div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill"></div>
        </div>
    </div>

    <nav class="bg-white border-b p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl text-white font-bold">SF</div>
            <div>
                <h1 class="font-bold text-gray-800 leading-none">SalesFlow Pro</h1>
                <span id="user-display" class="text-[10px] text-gray-400 font-medium">Guest User</span>
            </div>
        </div>
        <button onclick="toggleMenu()" class="p-2 text-gray-500 hover:bg-gray-100 rounded-full">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m4 6h16"></path></svg>
        </button>
    </nav>

    <div id="sidebar" class="fixed right-0 top-0 h-full w-72 bg-white z-[60] shadow-2xl translate-x-full p-6">
        <div class="flex justify-between items-center mb-10 border-b pb-4">
            <span class="font-bold text-indigo-600">MAIN MENU</span>
            <button onclick="toggleMenu()" class="text-2xl text-gray-300 hover:text-red-500">&times;</button>
        </div>
        <nav class="space-y-4 text-gray-600 font-medium">
            <a href="#" class="block p-3 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition">📊 แดชบอร์ดสรุปผล</a>
            <a href="#" class="block p-3 rounded-xl bg-indigo-50 text-indigo-600 border-l-4 border-indigo-600">➕ เพิ่มกิจกรรมการพบ</a>
            <a href="#" class="block p-3 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition">🕒 ประวัติย้อนหลัง</a>
            <hr>
            <button onclick="location.reload()" class="w-full text-left p-3 rounded-xl text-red-400 hover:bg-red-50">ออกจากระบบ</button>
        </nav>
    </div>

    <main class="p-4 md:p-8 max-w-2xl mx-auto">
        <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-gray-100">
            <div class="p-8 pb-0">
                <h2 class="text-3xl font-black text-gray-800 tracking-tight">บันทึกกิจกรรมลูกค้า</h2>
                <div class="h-1 w-20 bg-indigo-500 mt-2 rounded-full"></div>
            </div>

            <form id="salesForm" class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-3">
                        <label class="text-xs font-bold text-gray-400 uppercase">ชื่อลูกค้า (Autocomplete)</label>
                        <input type="text" id="customerName" list="clientList" onchange="autoCalculateVisit()"
                            class="w-full border-2 border-gray-50 p-4 rounded-2xl bg-gray-50 focus:border-indigo-400 outline-none transition mt-1" 
                            placeholder="พิมพ์ชื่อบริษัท..." required>
                        <datalist id="clientList"></datalist>
                    </div>
                    <div class="md:col-span-1">
                        <label class="text-xs font-bold text-gray-400 uppercase">ครั้งที่</label>
                        <input type="text" id="visitCount" readonly value="1"
                            class="w-full bg-white p-4 rounded-2xl border-2 border-indigo-100 text-center font-bold text-indigo-600 text-xl mt-1">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">วันที่/เวลา</label>
                        <input type="datetime-local" id="visitDateTime" class="w-full border-2 border-gray-50 p-4 rounded-2xl bg-gray-50 mt-1">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">ลูกค้า/ผู้ที่พบ</label>
                        <input type="text" id="contactPerson" class="w-full border-2 border-gray-50 p-4 rounded-2xl bg-gray-50 mt-1" placeholder="ชื่อคนรับหน้า">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase block mb-2">เป้าหมาย/หัวเรื่อง</label>
                    <div class="flex flex-wrap gap-2 mb-3">
                        <button type="button" onclick="setSubject('แนะนำตัวใหม่')" class="text-[10px] font-bold bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full hover:bg-indigo-200">แนะนำตัว</button>
                        <button type="button" onclick="setSubject('พรีเซนต์ใบเสนอราคา')" class="text-[10px] font-bold bg-green-100 text-green-600 px-3 py-1 rounded-full hover:bg-green-200">เสนอราคา</button>
                        <button type="button" onclick="setSubject('ติดตามการสั่งซื้อ')" class="text-[10px] font-bold bg-amber-100 text-amber-600 px-3 py-1 rounded-full hover:bg-amber-200">ติดตามงาน</button>
                    </div>
                    <input type="text" id="subject" class="w-full border-2 border-gray-50 p-4 rounded-2xl bg-gray-50 focus:border-indigo-400 outline-none" placeholder="ระบุเป้าหมายการเข้าพบ" required>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">รายละเอียด & คอมเมนต์ (Pain Point)</label>
                    <textarea id="comment" class="w-full border-2 border-gray-50 p-4 rounded-2xl h-32 bg-gray-50 focus:border-indigo-400 outline-none mt-1" placeholder="จดบันทึกปัญหาหรือสิ่งที่ลูกค้าต้องการ..."></textarea>
                </div>

                <div class="bg-slate-50 p-5 rounded-3xl border border-dashed border-gray-200">
                    <label class="text-xs font-bold text-gray-400 uppercase block mb-3 text-center">สรุปผลลัพธ์การเจรจา</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="status" value="ตามเป้า" class="peer hidden" checked>
                            <div class="p-3 border-2 rounded-2xl text-center bg-white text-xs font-bold text-gray-300 peer-checked:bg-green-500 peer-checked:text-white peer-checked:border-green-500 transition-all">🟢 ตามเป้า</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="status" value="รอลูกค้าตอบกลับ" class="peer hidden">
                            <div class="p-3 border-2 rounded-2xl text-center bg-white text-xs font-bold text-gray-300 peer-checked:bg-amber-500 peer-checked:text-white peer-checked:border-amber-500 transition-all">🟡 รอลูกค้า</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="status" value="ติดปัญหา/ไม่คืบหน้า" class="peer hidden">
                            <div class="p-3 border-2 rounded-2xl text-center bg-white text-xs font-bold text-gray-300 peer-checked:bg-red-500 peer-checked:text-white peer-checked:border-red-500 transition-all">🔴 มีปัญหา</div>
                        </label>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-[2rem] shadow-xl shadow-indigo-100 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <span id="btnText">💾 บันทึกและส่งข้อมูล</span>
                    <div id="loader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
            </form>
        </div>
    </main>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxrVQ5_q_7Ti-aUGn0EGGr1fmsqJwOV6akisrmH_irAgpwNCcY9AQsBq5n_ZJ0Wx2wy/exec";
        let allRecords = [];

        // 1. ระบบ Login
        function handleSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            document.getElementById('user-display').innerText = payload.email;
            document.getElementById('login-overlay').style.display = 'none';
            fetchInitialData(); // โหลดข้อมูล Autocomplete หลังจาก Login
        }

        // 2. ฟังก์ชัน UI
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('translate-x-full');
        }

        function setSubject(val) {
            document.getElementById('subject').value = val;
        }

        // 3. จัดการเวลาปัจจุบัน
        window.onload = () => {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('visitDateTime').value = now.toISOString().slice(0, 16);
        }

        // 4. ดึงข้อมูลจาก Sheet มาทำ Autocomplete & Count
        async function fetchInitialData() {
            try {
                const res = await fetch(WEB_APP_URL);
                allRecords = await res.json();
                const datalist = document.getElementById('clientList');
                const uniqueNames = [...new Set(allRecords.map(r => r[2]))];
                uniqueNames.forEach(name => {
                    if(name) {
                        let opt = document.createElement('option');
                        opt.value = name;
                        datalist.appendChild(opt);
                    }
                });
            } catch (e) { console.error("Error fetching data:", e); }
        }

        function autoCalculateVisit() {
            const name = document.getElementById('customerName').value;
            const count = allRecords.filter(r => r[2] === name).length;
            document.getElementById('visitCount').value = count + 1;
            
            // ดึงข้อมูล "คนที่พบ" ล่าสุดมาใส่ให้
            const lastMeeting = allRecords.filter(r => r[2] === name).pop();
            if(lastMeeting) {
                 // สมมติคอลัมน์คนที่พบเก็บไว้ในฐานข้อมูลด้วย (ต้องไปเพิ่มใน Google Script เอง)
                 // document.getElementById('contactPerson').value = lastMeeting[X];
            }
        }

        // 5. ส่งข้อมูล
        document.getElementById('salesForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            
            btn.disabled = true;
            loader.classList.remove('hidden');

            const payload = {
                customerName: document.getElementById('customerName').value,
                visitCount: document.getElementById('visitCount').value,
                visitDateTime: document.getElementById('visitDateTime').value,
                subject: document.getElementById('subject').value,
                comment: document.getElementById('comment').value,
                status: document.querySelector('input[name="status"]:checked').value
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                alert("✅ บันทึกสำเร็จ!");
                location.reload();
            } catch (err) {
                alert("❌ เกิดข้อผิดพลาด");
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
